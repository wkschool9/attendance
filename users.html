<div class="modern-card text-dark p-4 shadow-sm">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom flex-wrap gap-3">
    <h4 class="fw-bold m-0"><i class="fa-solid fa-chalkboard-user text-primary me-2"></i>จัดการสิทธิ์บุคลากร / ผู้ใช้งาน</h4>
    <button class="btn btn-modern btn-modern-primary rounded-pill shadow-sm px-4" onclick="openAddUserModal()">
      <i class="fa-solid fa-user-plus me-2"></i> เพิ่มผู้ใช้งานระบบ
    </button>
  </div>
  
  <div class="table-responsive">
    <table class="table table-modern align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th class="ps-3" style="width: 25%;">ชื่อบัญชีผู้ใช้งาน (Username)</th>
          <th style="width: 35%;">ชื่อ-นามสกุล</th>
          <th style="width: 25%;">สิทธิ์การเข้าถึงชั้นเรียน</th>
          <th class="text-center" style="width: 15%;">จัดการ</th>
        </tr>
      </thead>
      <tbody id="user-list-body">
        </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modern-card p-0 border-0 overflow-hidden shadow-lg">
      <div class="modal-header bg-white text-dark border-0 p-4 pb-2">
        <h5 class="modal-title fw-bold text-dark" id="userModalLabel"><i class="fa-solid fa-user-shield text-primary me-2"></i>จัดการข้อมูลผู้ใช้งาน</h5>
        <button type="button" class="btn-close rounded-pill" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4 text-dark pt-0">
        <form id="userForm" onsubmit="handleUserSubmit(event)">
          <input type="hidden" id="u-mode" value="add">
          
          <div class="mb-3">
            <label class="form-label text-muted small fw-600">ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" class="form-control form-control-modern bg-light border-0 shadow-sm" id="u-username" placeholder="เช่น admin หรือ teacher1" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label text-muted small fw-600">รหัสผ่าน (Password)</label>
            <input type="password" class="form-control form-control-modern bg-light border-0 shadow-sm" id="u-password" placeholder="ระบุรหัสผ่าน (เว้นว่างไว้ถ้าไม่ต้องการเปลี่ยนรหัสผ่านเดิม)">
          </div>

          <div class="mb-3">
            <label class="form-label text-muted small fw-600">ชื่อ-นามสกุล</label>
            <input type="text" class="form-control form-control-modern bg-light border-0 shadow-sm" id="u-name" placeholder="ชื่อ นามสกุล ของบุคลากร" required>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted small fw-600">สิทธิ์การดูแลชั้นเรียน</label>
            <select class="form-select form-select-modern bg-light border-0 shadow-sm fw-bold text-primary" id="u-class-assigned">
              <option value="All">All (ผู้ดูแลระบบทั้งหมด)</option>
              <option value="อนุบาล 2">อนุบาล 2</option>
              <option value="อนุบาล 3">อนุบาล 3</option>
              <option value="ป.1">ประถมศึกษาปีที่ 1</option>
              <option value="ป.2">ประถมศึกษาปีที่ 2</option>
              <option value="ป.3">ประถมศึกษาปีที่ 3</option>
              <option value="ป.4">ประถมศึกษาปีที่ 4</option>
              <option value="ป.5">ประถมศึกษาปีที่ 5</option>
              <option value="ป.6">ประถมศึกษาปีที่ 6</option>
            </select>
          </div>
          <button type="submit" class="btn btn-modern btn-modern-primary w-100 py-3 fs-6 rounded-pill shadow mt-3" id="btnSaveUserFinal">
            <i class="fa-solid fa-check-circle me-2"></i>บันทึกข้อมูลบุคลากร
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  let allUsers = [];

  function loadUsersView() {
    const tbody = document.getElementById('user-list-body');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted p-5"><span class="spinner-border spinner-border-sm me-2"></span>กำลังดึงข้อมูล...</td></tr>';
    
    google.script.run.withSuccessHandler(function(data) {
      allUsers = data;
      tbody.innerHTML = '';
      if(data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted p-5">ไม่พบข้อมูลผู้ใช้งาน</td></tr>';
        return;
      }
      
      data.forEach(user => {
        let roleBadge = user.class_assigned === 'All' 
          ? '<span class="badge bg-primary rounded-pill shadow-sm px-3 py-2">ผู้ดูแลระบบ (All)</span>' 
          : `<span class="badge bg-light text-dark border rounded-pill shadow-sm px-3 py-2">ประจำชั้น ${user.class_assigned}</span>`;

        let actionBtns = `
          <button class="btn btn-sm btn-light text-primary rounded-circle me-1" onclick="openEditUserModal('${user.username}')" title="แก้ไข"><i class="fa-solid fa-pen-to-square"></i></button>
          <button class="btn btn-sm btn-light text-danger rounded-circle" onclick="confirmDeleteUser('${user.username}')" title="ลบ"><i class="fa-solid fa-trash"></i></button>
        `;

        tbody.innerHTML += `
          <tr>
            <td class="ps-3"><i class="fa-solid fa-user text-muted me-3 fs-6 p-2 bg-light rounded-circle"></i><strong class="text-dark fs-6">${user.username}</strong></td>
            <td><span class="font-Sarabun fs-6 fw-500">${user.name || '-'}</span></td>
            <td>${roleBadge}</td>
            <td class="text-center p-0">${actionBtns}</td>
          </tr>
        `;
      });
    }).getUsers();
  }

  // --- เปิดฟอร์มเพิ่มบุคลากร ---
  function openAddUserModal() {
    document.getElementById('u-mode').value = 'add';
    document.getElementById('userModalLabel').innerText = 'เพิ่มผู้ใช้งานระบบใหม่';
    document.getElementById('userForm').reset();
    
    document.getElementById('u-username').disabled = false;
    document.getElementById('u-password').required = true; // เพิ่มใหม่ต้องใส่รหัสผ่านเสมอ
    
    new bootstrap.Modal(document.getElementById('userModal')).show();
  }

  // --- เปิดฟอร์มแก้ไขบุคลากร ---
  function openEditUserModal(username) {
    const user = allUsers.find(u => u.username === username);
    if(!user) return;

    document.getElementById('u-mode').value = 'edit';
    document.getElementById('userModalLabel').innerText = 'แก้ไขข้อมูลผู้ใช้งาน';
    document.getElementById('userForm').reset();
    
    document.getElementById('u-username').value = user.username;
    document.getElementById('u-username').disabled = true; // ห้ามเปลี่ยน Username หลัก
    document.getElementById('u-name').value = user.name || '';
    document.getElementById('u-class-assigned').value = user.class_assigned;
    
    // เวลาแก้ไข รหัสผ่านจะไม่จำเป็นต้องกรอก หากเว้นว่างไว้คือรหัสผ่านเดิม
    document.getElementById('u-password').required = false; 
    
    new bootstrap.Modal(document.getElementById('userModal')).show();
  }

  // --- ยืนยันการบันทึกข้อมูล ---
  function handleUserSubmit(e) {
    e.preventDefault();
    const mode = document.getElementById('u-mode').value;
    const btn = document.getElementById('btnSaveUserFinal');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> กำลังบันทึก...';
    btn.disabled = true;

    const userData = {
      username: document.getElementById('u-username').value,
      password: document.getElementById('u-password').value,
      name: document.getElementById('u-name').value,
      class_assigned: document.getElementById('u-class-assigned').value
    };

    if(mode === 'add') {
      google.script.run.withSuccessHandler(finishUserSubmit).addUser(userData);
    } else {
      google.script.run.withSuccessHandler(finishUserSubmit).updateUser(userData);
    }
  }

  function finishUserSubmit() {
    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
    const btn = document.getElementById('btnSaveUserFinal');
    btn.innerHTML = '<i class="fa-solid fa-check-circle me-2"></i>บันทึกข้อมูลบุคลากร';
    btn.disabled = false;
    alert('บันทึกข้อมูลผู้ใช้งานสำเร็จ!');
    loadUsersView();
  }

  // --- ยืนยันการลบ ---
  function confirmDeleteUser(username) {
    if(currentUser && currentUser.username === username) {
      alert('ไม่อนุญาตให้ลบบัญชีที่คุณกำลังใช้งานอยู่ ณ ขณะนี้ได้ครับ');
      return;
    }

    if(confirm(`ยืนยันการลบผู้ใช้งาน: ${username} ออกจากระบบ?\n*การกระทำนี้ไม่สามารถกู้คืนได้*`)) {
      google.script.run.withSuccessHandler(function() {
        alert('ลบผู้ใช้งานเรียบร้อยแล้ว');
        loadUsersView();
      }).deleteUser(username);
    }
  }
</script>
