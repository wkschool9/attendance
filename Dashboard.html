<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ระบบธุรการชั้นเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <h2 class="mb-4">สรุปสถิติชั้นเรียน</h2>
    
    <div class="row mb-4">
        <div class="col-md-4"><div class="card p-3 bg-primary text-white"><h5>นักเรียนทั้งหมด</h5><h2 id="total-students">-</h2></div></div>
        <div class="col-md-4"><div class="card p-3 bg-success text-white"><h5>มาวันนี้</h5><h2 id="present-count">-</h2></div></div>
        <div class="col-md-4"><div class="card p-3 bg-danger text-white"><h5>ขาด/ลา</h5><h2 id="absent-count">-</h2></div></div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-warning">นักเรียนขาดเรียนสะสม 3-4 วัน</div>
                <ul class="list-group list-group-flush" id="list-absent-3days">
                    <li class="list-group-item">กำลังโหลดข้อมูล...</li>
                </ul>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-danger text-white">นักเรียนขาดเรียนสะสม 5 วันขึ้นไป</div>
                <ul class="list-group list-group-flush" id="list-absent-5days">
                    <li class="list-group-item">กำลังโหลดข้อมูล...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
// ใส่ URL ที่ได้จากการ Deploy Google Apps Script ของคุณที่นี่
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwP2CcA2zhBsUgm1RRXJC702oSBrXC61Mu5OeWdMAGwdAhPBqEnDDTZS9wfLq18I6ltzg/exec";

function callGasAPI(action, params, callback) {
    var url = WEB_APP_URL + "?action=" + action;
    for (var key in params) { url += "&" + key + "=" + params[key]; }
    
    fetch(url)
        .then(response => response.json())
        .then(data => callback(data))
        .catch(err => console.error(err));
}

// โหลดข้อมูลเมื่อเปิดหน้าจอ
const userRole = localStorage.getItem("role");
const classAssigned = localStorage.getItem("class_assigned");

callGasAPI("getDashboardData", { role: userRole, classAssigned: classAssigned }, function(res) {
    if (res.success) {
        document.getElementById("total-students").innerText = res.data.totalStudents;
        document.getElementById("present-count").innerText = res.data.summary.present;
        document.getElementById("absent-count").innerText = (res.data.summary.absent + res.data.summary.sick);

        // แสดงผลกลุ่มเสี่ยง 3-4 วัน
        var html3 = "";
        if (res.data.absent3DaysList.length > 0) {
            res.data.absent3DaysList.forEach(item => {
                html3 += `<li class="list-group-item d-flex justify-content-between align-items-center">
                            ${item.name} (${item.room} เลขที่ ${item.no})
                            <span class="badge bg-warning rounded-pill">${item.count} วัน</span>
                          </li>`;
            });
        } else { html3 = '<li class="list-group-item text-muted">ไม่พบข้อมูลกลุ่มเสี่ยง</li>'; }
        document.getElementById("list-absent-3days").innerHTML = html3;

        // แสดงผลกลุ่มเสี่ยง 5 วันขึ้นไป
        var html5 = "";
        if (res.data.absent5DaysList.length > 0) {
            res.data.absent5DaysList.forEach(item => {
                html5 += `<li class="list-group-item d-flex justify-content-between align-items-center">
                            ${item.name} (${item.room} เลขที่ ${item.no})
                            <span class="badge bg-danger rounded-pill">${item.count} วัน</span>
                          </li>`;
            });
        } else { html5 = '<li class="list-group-item text-muted">ไม่พบข้อมูลกลุ่มเสี่ยง</li>'; }
        document.getElementById("list-absent-5days").innerHTML = html5;
    }
});
</script>
</body>
</html>
