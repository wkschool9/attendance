<div class="modern-card text-dark p-4 shadow-sm">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom flex-wrap gap-3">
    <div class="d-flex align-items-center gap-3">
      <h4 class="fw-bold m-0"><i class="fa-solid fa-id-card-clip text-primary me-2"></i>จัดการทะเบียนนักเรียน</h4>
      <select class="form-select form-select-modern rounded-pill shadow-sm py-1 px-5 fs-6 w-auto hidden" id="std-room-filter" onchange="loadStudentsView()">
        <option value="">แสดงทุกห้องเรียน</option>
        <option value="ป.1">ประถมศึกษาปีที่ 1</option>
        <option value="ป.2">ประถมศึกษาปีที่ 2</option>
        <option value="ป.3">ประถมศึกษาปีที่ 3</option>
        <option value="ป.4">ประถมศึกษาปีที่ 4</option>
        <option value="ป.5">ประถมศึกษาปีที่ 5</option>
        <option value="ป.6">ประถมศึกษาปีที่ 6</option>
        <option value="อ.2">อนุบาล 2</option>
        <option value="อ.3">อนุบาล 3</option>
      </select>
    </div>
    
    <div id="student-actions" class="d-flex gap-2">
      <button class="btn btn-outline-success rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#bulkImportModal">
        <i class="fa-solid fa-file-excel me-1"></i> นำเข้าจาก Excel
      </button>
      <button class="btn btn-modern btn-modern-primary rounded-pill px-4 shadow-sm" onclick="openAddModal()">
        <i class="fa-solid fa-plus-circle me-1"></i> เพิ่มนักเรียนใหม่
      </button>
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="table table-modern align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th class="ps-3" style="width: 15%;">รหัสประจำตัว</th>
          <th style="width: 12%;">ชั้นเรียน</th>
          <th style="width: 12%;">เลขที่</th>
          <th style="width: 36%;">ชื่อ-นามสกุล นักเรียน</th>
          <th style="width: 15%;">สถานะ</th>
          <th class="text-center" style="width: 10%;">จัดการ</th>
        </tr>
      </thead>
      <tbody id="student-list-body">
        </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="studentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modern-card p-0 border-0 overflow-hidden shadow-lg">
      <div class="modal-header bg-white p-4 border-0 pb-2">
        <h5 class="modal-title fw-bold" id="studentModalLabel">จัดการข้อมูลนักเรียน</h5>
        <button type="button" class="btn-close rounded-pill" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4 pt-0">
        <form id="studentForm" onsubmit="handleStudentSubmit(event)">
          <input type="hidden" id="form-mode" value="add">
          
          <div class="mb-3">
            <label class="form-label text-muted small fw-600">รหัสประจำตัวนักเรียน</label>
            <input type="text" class="form-control form-control-modern border-0 bg-light shadow-sm" id="std-id" placeholder="ระบุเลขประจำตัวนักเรียน" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small fw-600">ชื่อ-นามสกุล</label>
            <input type="text" class="form-control form-control-modern border-0 bg-light shadow-sm" id="std-name" placeholder="ชื่อจริง - นามสกุล" required>
          </div>
          <div class="row g-3">
            <div class="col-6 mb-3">
              <label class="form-label text-muted small fw-600">ระดับชั้น</label>
              <select class="form-select form-select-modern border-0 bg-light shadow-sm" id="std-room">
                <option value="อนุบาล 2">อนุบาล 2</option>
                <option value="อนุบาล 3">อนุบาล 3</option>
                <option value="ป.1">ประถมศึกษาปีที่ 1</option> 
                <option value="ป.2">ประถมศึกษาปีที่ 2</option> 
                <option value="ป.3">ประถมศึกษาปีที่ 3</option> 
                <option value="ป.4">ประถมศึกษาปีที่ 4</option> 
                <option value="ป.5">ประถมศึกษาปีที่ 5</option> 
                <option value="ป.6">ประถมศึกษาปีที่ 6</option>
              </select>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label text-muted small fw-600">เลขที่</label>
              <input type="number" class="form-control form-control-modern border-0 bg-light shadow-sm" id="std-no" required>
            </div>
          </div>
          <div class="mb-3" id="status-group">
            <label class="form-label text-muted small fw-600">สถานะนักเรียน</label>
            <select class="form-select form-select-modern border-0 bg-light shadow-sm text-success fw-bold" id="std-status">
              <option value="กำลังศึกษา">กำลังศึกษา</option>
              <option value="จบการศึกษา">จบการศึกษา</option>
              <option value="ย้ายสถานศึกษา">ย้ายสถานศึกษา</option>
              <option value="พ้นสภาพ">พ้นสภาพ</option>
            </select>
          </div>
          <button type="submit" class="btn btn-modern btn-modern-primary w-100 py-3 rounded-pill shadow mt-2" id="btn-save-student">
            <i class="fa-solid fa-floppy-disk me-2"></i>บันทึกข้อมูลนักเรียน
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="bulkImportModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modern-card border-0 shadow-lg">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold text-dark"><i class="fa-solid fa-file-csv text-success me-2"></i>นำเข้าข้อมูลนักเรียน (.CSV)</h5>
        <button type="button" class="btn-close rounded-pill" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-info small mb-4" id="import-notice-text">
          <b>คำแนะนำการเตรียมไฟล์:</b> เรียงคอลัมน์ใน Excel ดังนีู้:<br>
          รหัสประจำตัว, ชื่อ-นามสกุล, ชั้น, เลขที่ (แล้วบันทึกเป็นไฟล์ .CSV)
        </div>
        <div class="mb-3">
          <input type="file" id="csvFileInput" class="form-control rounded-pill p-3 border shadow-sm" accept=".csv">
        </div>
        <button class="btn btn-success w-100 rounded-pill py-2 shadow-sm" onclick="processCSV()">
          <i class="fa-solid fa-upload me-2"></i>อัปโหลดและบันทึกรายชื่อ
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let currentStudents = [];

  // 1. โหลดรายชื่อนักเรียน
  function loadStudentsView() {
    const role = currentUser ? currentUser.role : 'guest';
    const classAssigned = currentUser ? currentUser.class_assigned : '';
    const filterSelect = document.getElementById('std-room-filter');
    
    // จัดการ Dropdown และสิทธิ์
    if (role === 'admin') {
      filterSelect.classList.remove('hidden');
    } else {
      filterSelect.classList.add('hidden');
      if (classAssigned && classAssigned !== 'All') {
        filterSelect.value = classAssigned;
      }
    }
    
    const room = filterSelect.value;
    const tbody = document.getElementById('student-list-body');
    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-5"><span class="spinner-border spinner-border-sm me-2"></span>กำลังโหลดข้อมูล...</td></tr>';
    
    // 🟢 เปลี่ยนมาใช้ API: ดึงรายชื่อนักเรียน
    callGasAPI('getStudents', { 
      room: room, 
      role: role, 
      classAssigned: classAssigned 
    })
    .then(function(students) {
      currentStudents = students;
      renderStudentTable(students); // นำข้อมูลไปวาดตารางตามโค้ดเดิมของคุณ
    })
    .catch(function(err) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">❌ เกิดข้อผิดพลาดในการดึงข้อมูล: ' + err.message + '</td></tr>';
    });
  }

  // 2. เรนเดอร์ลงตาราง (ส่วนแสดงผล UI เหมือนเดิม)
  function renderStudentTable(students) {
    const tbody = document.getElementById('student-list-body');
    tbody.innerHTML = '';
    
    if(students.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4"><i class="fa-solid fa-folder-open mb-2 fs-3 d-block"></i>ยังไม่มีข้อมูลนักเรียน</td></tr>';
      return;
    }

    students.forEach(std => {
      let tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-bold text-dark ps-3">${std.id}</td>
        <td class="text-muted"><span class="badge bg-light text-dark border rounded-pill-sm px-2 py-1"><i class="fa-solid fa-hashtag me-1 text-primary"></i>${std.no}</span></td>
        <td class="fw-500 font-Sarabun text-dark">${std.name}</td>
        <td><span class="badge bg-primary rounded-pill-sm px-3 py-1 bg-opacity-10 text-primary border border-primary border-opacity-25">${std.room}</span></td>
        <td class="text-center">
          <div class="btn-group shadow-sm">
            <button class="btn btn-light btn-sm text-primary border" onclick="openEditStudentModal('${std.id}')"><i class="fa-solid fa-pen-to-square"></i></button>
            <button class="btn btn-light btn-sm text-danger border" onclick="confirmDeleteStudent('${std.id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  // 3. ฟังก์ชันการเปิด Modal ต่างๆ (ใช้โค้ดเดิม)
  function openAddStudentModal() {
    document.getElementById('studentModalTitle').innerHTML = '<i class="fa-solid fa-user-plus text-primary me-2"></i>เพิ่มนักเรียนใหม่';
    document.getElementById('s-mode').value = 'add';
    document.getElementById('s-id').value = '';
    document.getElementById('s-id').disabled = false;
    document.getElementById('s-name').value = '';
    document.getElementById('s-no').value = '';
    
    const role = currentUser ? currentUser.role : 'guest';
    const classAssigned = currentUser ? currentUser.class_assigned : '';
    const roomSelect = document.getElementById('s-room');
    
    if (role !== 'admin' && classAssigned) {
      roomSelect.value = classAssigned;
      roomSelect.disabled = true;
    } else {
      roomSelect.disabled = false;
    }
    
    new bootstrap.Modal(document.getElementById('studentModal')).show();
  }

  function openEditStudentModal(id) {
    const std = currentStudents.find(s => s.id.toString() === id.toString());
    if(!std) return;

    document.getElementById('studentModalTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-primary me-2"></i>แก้ไขข้อมูลนักเรียน';
    document.getElementById('s-mode').value = 'edit';
    document.getElementById('s-id').value = std.id;
    document.getElementById('s-id').disabled = true;
    document.getElementById('s-name').value = std.name;
    document.getElementById('s-room').value = std.room;
    document.getElementById('s-no').value = std.no;
    
    const role = currentUser ? currentUser.role : 'guest';
    if (role !== 'admin') {
      document.getElementById('s-room').disabled = true;
    }
    
    new bootstrap.Modal(document.getElementById('studentModal')).show();
  }

  function openBulkImportModal() {
    new bootstrap.Modal(document.getElementById('bulkImportModal')).show();
  }

  // 4. บันทึก/แก้ไข นักเรียน
  function submitStudent() {
    const btn = document.getElementById('btnSaveStudentFinal');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> กำลังบันทึก...';
    btn.disabled = true;

    const studentData = {
      id: document.getElementById('s-id').value,
      name: document.getElementById('s-name').value,
      room: document.getElementById('s-room').value,
      no: document.getElementById('s-no').value
    };

    const action = document.getElementById('s-mode').value === 'add' ? 'addStudent' : 'updateStudent';

    // 🟢 เปลี่ยนมาใช้ API: เพิ่ม หรือ แก้ไขข้อมูล
    callGasAPI(action, { student: studentData })
      .then(function() {
        bootstrap.Modal.getInstance(document.getElementById('studentModal')).hide();
        btn.innerHTML = '<i class="fa-solid fa-check-circle me-2"></i>บันทึกข้อมูลนักเรียน';
        btn.disabled = false;
        alert('บันทึกข้อมูลสำเร็จ!');
        loadStudentsView(); // โหลดตารางใหม่
      })
      .catch(function(err) {
        alert('เกิดข้อผิดพลาด: ' + err.message);
        btn.innerHTML = '<i class="fa-solid fa-check-circle me-2"></i>บันทึกข้อมูลนักเรียน';
        btn.disabled = false;
      });
  }

  // 5. ลบข้อมูลนักเรียน
  function confirmDeleteStudent(id) {
    if(confirm('ยืนยันการลบข้อมูลนักเรียนรหัส ' + id + ' ใช่หรือไม่? (ไม่สามารถกู้คืนได้)')) {
      
      // 🟢 เปลี่ยนมาใช้ API: ลบข้อมูล
      callGasAPI('deleteStudent', { id: id })
        .then(function() {
          alert('ลบข้อมูลสำเร็จ');
          loadStudentsView();
        })
        .catch(function(err) {
          alert('เกิดข้อผิดพลาดในการลบ: ' + err.message);
        });
    }
  }

  // 6. การนำเข้าไฟล์ CSV (Bulk Import)
  document.getElementById('excelFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
      const bstr = evt.target.result;
      const lines = bstr.split(/\r?\n/);
      let students = [];
      let deniedCount = 0;
      const role = currentUser ? currentUser.role : 'guest';
      const classAssigned = currentUser ? currentUser.class_assigned : '';

      // ข้ามแถวที่ 1 (Header)
      for(let i = 1; i < lines.length; i++) { 
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(",");
        
        if (cols.length >= 4) {
          const importedRoom = cols[2].trim();
          
          // ระบบความปลอดภัย: ถ้าเป็นครูประจำชั้น จะนำเข้าได้เฉพาะห้องของตัวเอง
          if (role !== 'admin' && importedRoom !== classAssigned) {
            deniedCount++;
            continue;
          }

          students.push({
            id: cols[0].trim(),
            name: cols[1].trim(),
            room: importedRoom,
            no: cols[3].trim() // สมมติให้ลำดับเลขที่อยู่คอลัมน์ที่ 4 (Index 3) ตามไฟล์ตัวอย่าง
          });
        }
      }

      if (deniedCount > 0 && role !== 'admin') {
        alert(`⚠️ มีรายชื่อนักเรียนจำนวน ${deniedCount} แถวที่ระบุห้องเรียนไม่ตรงกับห้องประจำชั้นของคุณ (ระบบปฏิเสธการนำเข้าเพื่อความปลอดภัย)`);
      }

      if(students.length > 0) {
        if(confirm(`พบข้อมูลนักเรียนที่ถูกต้องตรงตามสิทธิ์ ${students.length} รายการ ต้องการยืนยันนำเข้าใช่หรือไม่?`)) {
          
          // 🟢 เปลี่ยนมาใช้ API: อัปโหลดข้อมูลรวดเดียว
          callGasAPI('bulkImportStudents', { students: students })
            .then(function() {
              alert('นำเข้าข้อมูลสำเร็จเรียบร้อย!');
              bootstrap.Modal.getInstance(document.getElementById('bulkImportModal')).hide();
              document.getElementById('excelFileInput').value = ''; // เคลียร์ไฟล์ออก
              loadStudentsView();
            })
            .catch(function(err) {
              alert('เกิดข้อผิดพลาดในการนำเข้า: ' + err.message);
            });
            
        }
      } else {
        alert('ไม่พบข้อมูลนักเรียนที่สามารถนำเข้าได้');
      }
    };
    reader.readAsText(file);
  });
</script>
