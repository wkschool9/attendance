<style>
/* CSS พิเศษสำหรับ Navbar ใหม่ (Minimalist Active Pill Style) */
.navbar .nav-link {
  transition: all 0.2s ease;
  font-weight: 500;
  border: 1px solid transparent;
}
.navbar .nav-link:hover {
  background-color: var(--light-bg);
  border-color: #f1f3f5;
}
.navbar .nav-item.active .nav-link {
  background-color: #007bff0a; /* Soft primary glow */
  color: var(--modern-primary) !important;
  border-color: #007bff20;
}
</style>

<script>
  // ฟังก์ชันเล็กๆ เพื่อเพิ่มสถานะ Active ให้เมนูใน Navbar
  function updateActiveLink(viewName) {
    document.querySelectorAll('.navbar-nav .nav-item').forEach(li => li.classList.remove('active'));
    // หา li ที่มี a tag และมีการเรียก switchView ด้วย viewName นั้นๆ
    document.querySelectorAll('.navbar-nav .nav-item').forEach(li => {
      const a = li.querySelector('a');
      if(a && a.getAttribute('onclick') && a.getAttribute('onclick').includes(`switchView('${viewName}')`)) {
        li.classList.add('active');
      }
    });
  }

  // เรียกใช้หลังสลับ View
  const originalSwitchViewNavbar = window.switchView;
  window.switchView = function(viewName) {
    originalSwitchViewNavbar(viewName);
    updateActiveLink(viewName);
  }
</script>
